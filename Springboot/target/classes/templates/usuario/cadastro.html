<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Usuários</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- Fragments do menu -->
<div th:replace="~{/fragments/menu.html :: menu}"></div>

<main>
    <div class="card">
        <h2>Cadastro de Usuários</h2>
        <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-grid">

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required th:field="*{email}">
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="senha" th:field="*{senha}">
                </div>

                <div class="form-group">
                    <label>Role:</label>
                    <select th:field="*{role}">
                        <option th:each="r : ${roles}"
                                th:value="${r}"
                                th:text="${r}">
                        </option>

                    </select>
                </div>

            </div>

            <div style="margin-top: 20px;">
                <button type="submit" class="btn btn-success">Salvar</button>
                <a th:href="@{/usuarios}" class="btn btn-alter">Voltar para Lista</a>
            </div>
        </form>
    </div>
</main>

<!-- Fragments do footer -->
<div th:replace="~{/fragments/footer.html :: footer}"></div>
</body>
</html>
