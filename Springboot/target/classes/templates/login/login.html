<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f0f0; }
        .box { background: white; padding: 32px; border-radius: 8px; width: 320px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 20px; text-align: center; }
        label { display: block; margin-bottom: 4px; font-size: 14px; }
        input { width: 100%; padding: 8px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>
    <form th:action="@{/login}" method="post">
        <label>E-mail</label>
        <input type="email" name="username" placeholder="Email" />
        <label>Senha</label>
        <input type="password" name="password" placeholder="Senha" />
        <button type="submit">Entrar</button>
    </form>
</div>
</body>
</html>
