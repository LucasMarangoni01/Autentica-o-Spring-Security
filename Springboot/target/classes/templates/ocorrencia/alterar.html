<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Ocorrência</title>
    <link rel="stylesheet" href="/style.css">

    <style>

        /* NOVO: container da imagem */
        .foto-container {
            position: relative;
            display: inline-block;
        }

        /* NOVO: botão sobreposto */
        .camera-icon {
            position: absolute;
            bottom: 5px;
            right: 5px;

            width: 60px;
            height: 40px;

            /*background: gray;*/
            padding: 5px;
            border-radius: 5%;

            cursor: pointer;
        }

        /* MODAL */
        .modal-foto {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);

            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content-foto {
            background: white;
            padding: 25px;
            width: 320px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .botoes-foto {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .botoes-foto button {
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #198754;
            color: white;
            cursor: pointer;
        }

        .fechar {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>

</head>
<body>

<div th:replace="~{/fragments/menu.html :: menu}"></div>

<main>
    <div class="card">
        <h2>Alterar Ocorrência</h2>

        <form id="form-cadastro"
              th:action="@{/ocorrencia/salvar}"
              th:object="${ocorrencia}"
              method="post"
              enctype="multipart/form-data">

            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{fotoOcorrencia}">

            <div class="form-grid">

                <!-- FOTO ATUAL -->
                <div class="form-group" style="grid-column: span 2; text-align:center;">
                    <label>Foto Atual</label>

                    <div class="foto-container">

                        <img id="previewImagem"
                             th:if="${ocorrencia.fotoOcorrencia != null}"
                             th:src="@{'/foto_ocorrencia/' + ${ocorrencia.fotoOcorrencia}}"
                             class="foto-preview">

                        <img id="previewImagem"
                             th:if="${ocorrencia.fotoOcorrencia == null}"
                             src="/foto_ocorrencia/default.png"
                             class="foto-preview">

                        <!-- CÂMERA SOBREPOSTA -->
                        <img th:src="@{/img/cam.png}"
                             class="camera-icon"
                             onclick="abrirModalFoto()"
                             alt="Alterar foto">

                    </div>

                    <input type="file" id="inputArquivo" name="arquivoFoto" accept="image/*" style="display: none;">
                </div>

                <div class="form-group">
                    <label>Data Ocorrência:</label>
                    <input type="text" required th:field="*{dataOcorrencia}">
                </div>

                <div class="form-group">
                    <label>Descrição:</label>
                    <input type="text" required th:field="*{descricaoOcorrencia}">
                </div>

                <div class="form-group">
                    <label>Status:</label>
                    <select id="status" th:field="*{status}">
                        <option value="ABERTA">Aberta</option>
                        <option value="EM_ANDAMENTO">Em andamento</option>
                        <option value="CONCLUIDA">Concluída</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Rua</label>
                    <input type="text" th:field="*{rua}">
                </div>

                <div class="form-group">
                    <label>Bairro</label>
                    <input type="text" required th:field="*{bairro}">
                </div>

            </div>

            <div style="margin-top: 20px;">
                <button type="submit" class="btn btn-success">Alterar</button>
                <a th:href="@{/ocorrencia/listagem}" class="btn btn-alter">Voltar para Lista</a>
            </div>

        </form>
    </div>
</main>

<div th:replace="~{/fragments/footer.html :: footer}"></div>

<script src="/js/ocorrencia.js"></script>

<!-- MODAL -->
<div id="modalFoto" class="modal-foto">
    <div class="modal-content-foto">

        <h3>Selecionar Foto</h3>

        <div class="botoes-foto">
            <button onclick="selecionarArquivo()">📁 Arquivo</button>
            <button onclick="iniciarCamera()">📷 Câmera</button>
        </div>

        <video id="video" autoplay style="display:none; width:100%;"></video>
        <canvas id="canvas" style="display:none;"></canvas>

        <button id="btnCapturar" onclick="capturarFoto()" style="display:none;">
            📸 Capturar
        </button>

        <button onclick="fecharModalFoto()">Fechar</button>
    </div>
</div>

<script>
    let stream;

    function abrirModalFoto() {
        document.getElementById("modalFoto").style.display = "flex";
    }

    function fecharModalFoto() {
        document.getElementById("modalFoto").style.display = "none";

        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }

        document.getElementById("video").style.display = "none";
        document.getElementById("btnCapturar").style.display = "none";
    }

    function selecionarArquivo() {
        const input = document.getElementById("inputArquivo");

        input.onchange = function () {
            const file = input.files[0];
            if (file) atualizarPreview(file);
        };

        input.click();
        fecharModalFoto();
    }

    function iniciarCamera() {
        const video = document.getElementById("video");
        const botao = document.getElementById("btnCapturar");

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(function (s) {
                stream = s;
                video.srcObject = stream;
                video.style.display = "block";
                botao.style.display = "inline-block";
            })
            .catch(function (err) {
                alert("Erro ao acessar câmera: " + err);
            });
    }

    function capturarFoto() {
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const input = document.getElementById("inputArquivo");

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0);

        canvas.toBlob(function (blob) {
            const file = new File([blob], "foto.png", { type: "image/png" });

            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            input.files = dataTransfer.files;

            atualizarPreview(file);
            fecharModalFoto();
        });
    }

    function atualizarPreview(file) {
        const preview = document.getElementById("previewImagem");
        const reader = new FileReader();

        reader.onload = function (e) {
            preview.src = e.target.result;
        };

        reader.readAsDataURL(file);
    }
</script>

</body>
</html>
